services:
  - type: web
    name: escoladecrock
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: escoladecrock-db
          property: connectionString

databases:
  - name: escoladecrock-db
    plan: free
